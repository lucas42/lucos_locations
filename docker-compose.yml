services:
  otrecorder:
    container_name: lucos_locations_otrecorder
    image: owntracks/recorder
    volumes:
      - store:/store
      - config:/config
    restart: always
    environment:
      - OTR_HOST=mqtt
      - OTR_PORT=1883
      - OTR_HTTPPORT=8083 # Runs HTTP on default port
      - OTR_GEOKEY
      - OTR_USER=${RECORDER_USERNAME}
      - OTR_PASS=${RECORDER_PASSWORD}
    depends_on:
      mqtt:
        condition: service_healthy
  otfrontend:
    container_name: lucos_locations_otfrontend
    build: ./otfrontend
    image: lucas42/lucos_locations_otfrontend:${VERSION:-latest}
    ports:
      - $PORT:80
    environment:
      - SERVER_HOST=otrecorder
      - SERVER_PORT=8083
      - OT_USERNAME
      - OT_PASSWORD
      - LISTEN_PORT=80
      - HEALTHCHECK_USERNAME
      - HEALTHCHECK_PASSWORD
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - otrecorder
  mqtt:
    container_name: lucos_locations_mosquitto
    build: ./mosquitto
    image: lucas42/lucos_locations_mosquitto:${VERSION:-latest}
    restart: always
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "1883"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "8883:8883"
    environment:
      - OT_USERNAME
      - OT_PASSWORD
      - RECORDER_USERNAME
      - RECORDER_PASSWORD
      - HEALTHCHECK_USERNAME
      - HEALTHCHECK_PASSWORD
    volumes:
      - "mosquitto_data:/mosquitto/data"
      - "mosquitto_log:/mosquitto/log"
      - "letsencrypt:/etc/letsencrypt"

volumes:
  store:
  config:
  mosquitto_data:
  mosquitto_log:
  letsencrypt:
    external: true
    name: lucos_router_letsencrypt