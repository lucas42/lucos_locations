services:
  otrecorder:
    container_name: lucos_locations_otrecorder
    image: owntracks/recorder
    volumes:
      - store:/store
      - config:/config
    restart: always
    environment:
      - OTR_HOST=mqtt
      - OTR_PORT=1883
      - OTR_HTTPPORT=8083 # Runs HTTP on default port
      - OTR_GEOKEY
      - OTR_USER=${RECORDER_USERNAME}
      - OTR_PASS=${RECORDER_PASSWORD}
    depends_on:
      mqtt:
        condition: service_healthy
  otfrontend:
    container_name: lucos_locations_otfrontend
    build: ./otfrontend
    image: lucas42/lucos_locations_otfrontend:${VERSION:-latest}
    ports:
      - $PORT:80
    environment:
      - SERVER_HOST=otrecorder
      - SERVER_PORT=8083
      - OT_USERNAME
      - OT_PASSWORD
      - LISTEN_PORT=80
      - HEALTHCHECK_USERNAME
      - HEALTHCHECK_PASSWORD
      - MQTT_HOST
      - MQTT_PORT
      - OAUTH2_PROXY_HOST=oauth2-proxy
      - OAUTH2_PROXY_PORT=4180
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - otrecorder
      - oauth2-proxy
  # Fronts the human map-UI paths only (see nginx.tmpl) with an aithne OIDC
  # login, gated on the locations:read scope. The device publish path and
  # MQTT stay on the existing credential auth below — a phone can't do an
  # interactive OIDC login. See lucas42/lucos_locations#92.
  oauth2-proxy:
    container_name: lucos_locations_oauth2_proxy
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3
    restart: always
    environment:
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_PROVIDER=oidc
      - OAUTH2_PROXY_CLIENT_ID=lucos_locations
      - OAUTH2_PROXY_CLIENT_SECRET=${KEY_LUCOS_AITHNE}
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET}
      - OAUTH2_PROXY_COOKIE_SECURE=${OAUTH2_PROXY_COOKIE_SECURE:-true}
      - OAUTH2_PROXY_COOKIE_SAMESITE=lax
      - OAUTH2_PROXY_REDIRECT_URL=${APP_ORIGIN}/oauth2/callback
      # aithne's id_token `iss` is always its browser-facing origin, and the
      # login redirect must send the browser there too. But this container's
      # own outbound discovery/token/JWKS calls need a container-reachable
      # address, which differs from AITHNE_ORIGIN in dev (see AITHNE_JWKS_URL
      # precedent in ~/.claude/references — Docker bridge IP in dev, same
      # public origin in prod). Skip discovery and set every endpoint
      # explicitly rather than relying on fetching it from AITHNE_ORIGIN.
      - OAUTH2_PROXY_OIDC_ISSUER_URL=${AITHNE_ORIGIN}
      - OAUTH2_PROXY_SKIP_OIDC_DISCOVERY=true
      - OAUTH2_PROXY_LOGIN_URL=${AITHNE_ORIGIN}/oauth2/authorize
      - OAUTH2_PROXY_REDEEM_URL=${AITHNE_TOKEN_URL}
      - OAUTH2_PROXY_OIDC_JWKS_URL=${AITHNE_JWKS_URL}
      # Gate on locations:read. oauth2-proxy reads the groups claim straight
      # off the id_token minted at token redemption (lucas42/lucos_aithne#277)
      # — no /oauth2/userinfo call needed for this check.
      - OAUTH2_PROXY_OIDC_GROUPS_CLAIM=scopes
      - OAUTH2_PROXY_ALLOWED_GROUPS=locations:read
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_UPSTREAMS=static://202
      - OAUTH2_PROXY_SET_XAUTHREQUEST=true
      - OAUTH2_PROXY_SILENCE_PING_LOGGING=true
  mqtt:
    container_name: lucos_locations_mosquitto
    build: ./mosquitto
    image: lucas42/lucos_locations_mosquitto:${VERSION:-latest}
    restart: always
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "1883"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "8883:8883"
    environment:
      - OT_USERNAME
      - OT_PASSWORD
      - RECORDER_USERNAME
      - RECORDER_PASSWORD
      - HEALTHCHECK_USERNAME
      - HEALTHCHECK_PASSWORD
    volumes:
      - "mosquitto_data:/mosquitto/data"
      - "mosquitto_log:/mosquitto/log"
      - "letsencrypt:/etc/letsencrypt"

volumes:
  store:
  config:
  mosquitto_data:
  mosquitto_log:
  letsencrypt:
    external: true
    name: lucos_router_letsencrypt